<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Bonus Games · KP2A</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      padding: 12px 10px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .paper {
      max-width: 550px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 6px 18px rgba(0,20,40,0.1);
      padding: 22px 16px;
    }
    h1 {
      font-size: 2rem;
      color: #1d3e5e;
      margin-bottom: 5px;
    }
    .sub {
      color: #3a6b8c;
      font-size: 0.95rem;
      border-bottom: 1px solid #ced9e5;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .token-section {
      background: #eef2f7;
      border-radius: 30px;
      padding: 25px 20px;
      margin-bottom: 25px;
      text-align: center;
      border: 2px solid #b8cde0;
    }
    .token-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1d4e6b;
      margin-bottom: 15px;
    }
    .token-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.2rem;
      border: 2px solid #8aa9c4;
      border-radius: 60px;
      text-align: center;
      margin-bottom: 15px;
      background: white;
    }
    .token-btn {
      background: #1e4e73;
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .token-btn:active {
      background: #123a55;
    }
    .token-btn:disabled {
      background: #b0c4db;
      cursor: not-allowed;
    }
    .error-message {
      color: #c13a3a;
      font-weight: 600;
      margin-top: 10px;
      min-height: 30px;
    }
    .success-message {
      color: #1f7a4c;
      font-weight: 600;
    }
    .games-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }
    .game-card {
      background: #f9fcff;
      border: 1px solid #cbdae9;
      border-radius: 24px;
      padding: 20px 12px;
      text-align: center;
      transition: 0.2s;
    }
    .game-card.locked {
      filter: blur(1.5px);
      opacity: 0.5;
      pointer-events: none;
    }
    .game-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    .game-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e3b5c;
      margin-bottom: 5px;
    }
    .game-desc {
      font-size: 0.8rem;
      color: #5f7d9c;
      margin-bottom: 15px;
    }
    .play-btn {
      background: #2a7f4a;
      color: white;
      border: none;
      padding: 10px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .play-btn:active {
      background: #1e5f37;
    }
    .locked-badge {
      background: #aaa;
      color: white;
      padding: 5px 0;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .footer-note {
      text-align: center;
      color: #7a8b9f;
      font-size: 0.8rem;
      margin-top: 25px;
      font-style: italic;
    }
    .home-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #ffffffdd;
      padding: 6px 14px;
      font-size: 0.85rem;
      border-radius: 30px;
      text-decoration: none;
      color: #2c3e50;
      backdrop-filter: blur(2px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 999;
      border: 1px solid #d0ddee;
      font-weight: 500;
    }
  </style>
</head>
<body>
<a href="../index.html" class="home-btn">🏠 Home</a>

<div class="paper">
  <h1>🎮 Bonus Games</h1>
  <div class="sub">Ask your teacher for today's token</div>

  <!-- TOKEN INPUT SECTION -->
  <div class="token-section">
    <div class="token-label">🔑 Enter today's token:</div>
    <input type="text" id="tokenInput" class="token-input" placeholder="e.g., CAT2025" autocomplete="off">
    <button class="token-btn" id="unlockBtn" onclick="unlockGames()">Unlock Games</button>
    <div id="tokenMessage" class="error-message"></div>
  </div>

  <!-- GAMES SECTION -->
  <div id="gamesContainer">
    <!-- Akan diisi JS -->
  </div>

  <div class="footer-note">
    ⏰ New token every day. Complete your book tasks first!
  </div>
</div>

<script>
  // ==================== TOKEN SYSTEM ====================
  // Token valid (ganti setiap hari)
  const validTokens = {
    'MONDAY': 'CAT2025',
    'TUESDAY': 'DOG2025',
    'WEDNESDAY': 'FISH2025',
    'THURSDAY': 'BIRD2025',
    'FRIDAY': 'SUN2025',
    'SATURDAY': 'MOON2025',
    'SUNDAY': 'STAR2025'
  };

  // Dapatkan token berdasarkan hari ini
  function getTodayToken() {
    const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
    const today = days[new Date().getDay()];
    return validTokens[today];
  }

  // Cek apakah sudah unlock
  let isUnlocked = false;
  
  // Cek localStorage untuk status unlock
  function checkSavedUnlock() {
    const savedDate = localStorage.getItem('gamesUnlockDate');
    const today = new Date().toDateString();
    
    if (savedDate === today) {
      isUnlocked = true;
      document.getElementById('tokenInput').disabled = true;
      document.getElementById('unlockBtn').disabled = true;
    }
  }

  // Fungsi unlock
  function unlockGames() {
    const token = document.getElementById('tokenInput').value.trim();
    const todayToken = getTodayToken();
    const msgDiv = document.getElementById('tokenMessage');
    
    if (token === todayToken) {
      // Token valid
      isUnlocked = true;
      localStorage.setItem('gamesUnlockDate', new Date().toDateString());
      document.getElementById('tokenInput').disabled = true;
      document.getElementById('unlockBtn').disabled = true;
      msgDiv.innerHTML = '✅ Games unlocked! Enjoy your reward.';
      msgDiv.className = 'success-message';
      renderGames();
    } else {
      msgDiv.innerHTML = '❌ Invalid token. Please ask your teacher.';
      msgDiv.className = 'error-message';
    }
  }

  // ==================== GAMES ====================
  const games = [
    { 
      id: 'wordguess',
      icon: '🔤', 
      title: 'Word Guess', 
      desc: 'Guess the word from description',
      file: 'games/wordguess.html'
    },
    { 
      id: 'hangman',
      icon: '🎭', 
      title: 'Hangman', 
      desc: 'Classic hangman game',
      file: 'games/hangman.html'
    },
    { 
      id: 'match',
      icon: '🔄', 
      title: 'Word Match', 
      desc: 'Match words with pictures',
      file: 'games/match.html'
    },
    { 
      id: 'spelling',
      icon: '✏️', 
      title: 'Spelling Bee', 
      desc: 'Listen and spell',
      file: 'games/spelling.html'
    }
  ];

  function renderGames() {
    const container = document.getElementById('gamesContainer');
    let html = '<div class="games-grid">';
    
    games.forEach(game => {
      if (isUnlocked) {
        html += `
          <div class="game-card">
            <div class="game-icon">${game.icon}</div>
            <div class="game-title">${game.title}</div>
            <div class="game-desc">${game.desc}</div>
            <a href="${game.file}" class="play-btn" style="padding:10px 0;">▶ Play</a>
          </div>
        `;
      } else {
        html += `
          <div class="game-card locked">
            <div class="game-icon">${game.icon}</div>
            <div class="game-title">${game.title}</div>
            <div class="game-desc">${game.desc}</div>
            <div class="locked-badge" style="padding:10px 0;">🔒 Locked</div>
          </div>
        `;
      }
    });
    
    html += '</div>';
    container.innerHTML = html;
  }

  // Initial render
  checkSavedUnlock();
  renderGames();

  // Allow Enter key
  document.getElementById('tokenInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      unlockGames();
    }
  });
</script>
</body>
</html>
