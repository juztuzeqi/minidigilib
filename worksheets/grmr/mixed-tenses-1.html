        }

        }

            margin-left: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        // Render soal berdasarkan paket dengan urutan diacak
        function renderPacket(packetIndex) {

            const container = document.getElementById('questionsContainer');
            let html = '';
            
            questions.forEach((q, idx) => {
                html += `<div class="qcard">
                    <span class="qnum">Q${idx+1}.</span>
                    <span class="stem">${q.stem}</span>
                    <div class="options">`;
                
                q.opts.forEach((opt, optIdx) => {
                    html += `<label>
                        <input type="radio" name="q${idx}" value="${optIdx}"> ${opt}
                    </label>`;
                });
                
                html += `</div>
                    <span class="fb" id="fbQ${idx}"></span>
                </div>`;
            });
            
            container.innerHTML = html;
            document.getElementById('packetDisplay').innerText = `Paket ${packetIndex + 1}/5`;
            
            // Reset scores
            document.getElementById('scoreCorrect').innerText = '0';
            document.getElementById('scorePercent').innerText = '0%';
            
            // Clear all feedback
            for (let i = 0; i < 25; i++) {
                const fb = document.getElementById(`fbQ${i}`);
                if (fb) fb.innerText = '';
                
                // Uncheck all radios
                const radios = document.getElementsByName(`q${i}`);
                if (radios) {
                    radios.forEach(r => r.checked = false);
                }
            }
        }

            currentQuestions.forEach((q, idx) => {
                html += `<div class="qcard">
                    <span class="qnum">Q${idx+1}.</span>
                    <span class="stem">${q.stem}</span>
                    <div class="options">`;
                
                q.opts.forEach((opt, optIdx) => {
                    html += `<label>
                        <input type="radio" name="q${idx}" value="${optIdx}"> ${opt}
                    </label>`;
                });
                
                html += `</div>
                    <span class="fb" id="fbQ${idx}"></span>
                </div>`;
            });
            
            container.innerHTML = html;
            document.getElementById('packetDisplay').innerText = `Paket ${packetIndex + 1}/5`;
            
            // Reset scores
            document.getElementById('scoreCorrect').innerText = '0';
            document.getElementById('scorePercent').innerText = '0%';
        }

        // Fungsi scoring yang benar
        function checkAnswers() {
            let correct = 0;
            
            for (let i = 0; i < 25; i++) {
                const radios = document.getElementsByName(`q${i}`);
                let selected = null;
                for (let r of radios) if (r.checked) { selected = r.value; break; }
                
                const fb = document.getElementById(`fbQ${i}`);
                if (selected !== null && parseInt(selected) === currentQuestions[i].correct) {
                    fb.innerText = '✓';
                    fb.className = 'fb correct';
                    correct++;
                } else {
                    const benar = currentQuestions[i].opts[currentQuestions[i].correct];
                    fb.innerText = selected ? `✗ (${benar})` : `? (${benar})`;
                    fb.className = 'fb wrong';
                }
            }
            
            const percent = Math.round((correct / 25) * 100);
            document.getElementById('scoreCorrect').innerText = correct;
            document.getElementById('scorePercent').innerText = percent + '%';
            
            document.getElementById('scorePanel').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Reset pindah paket (acak)
        function newPacket() {
            let newIndex = Math.floor(Math.random() * 5);
            // Hindari paket yang sama berturut-turut
            while (newIndex === currentPacket && questionBank.length > 1) {
                newIndex = Math.floor(Math.random() * 5);
            }
            currentPacket = newIndex;
            renderPacket(currentPacket);
        }

        // Initial render
        renderPacket(0);

        // Event listeners
        document.getElementById('checkBtn').addEventListener('click', checkAnswers);
        document.getElementById('checkBottomBtn').addEventListener('click', checkAnswers);
        document.getElementById('resetBtn').addEventListener('click', newPacket);
    })();
</script>
</body>
</html>
