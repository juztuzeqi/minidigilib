<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Test - MA 4</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f7ff;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow: 0 8px 25px rgba(0,20,50,0.15);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #1d4e6b;
            margin-bottom: 20px;
        }
        .construction-icon {
            font-size: 5rem;
            margin: 20px 0;
            animation: gentlePulse 2s infinite ease-in-out;
        }
        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        h2 {
            font-size: 2rem;
            color: #b45f2b;
            margin-bottom: 15px;
        }
        .message {
            background: #fef7e0;
            border: 3px dashed #c0a86a;
            border-radius: 40px;
            padding: 25px;
            margin: 25px 0;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #4d3e1a;
        }
        .highlight {
            background: #1e4e73;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 10px 0;
            font-weight: 600;
        }
        .button {
            display: inline-block;
            background: #e9f2fa;
            border: 2px solid #8eb9d5;
            border-radius: 60px;
            padding: 15px 40px;
            margin: 20px 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d4e6b;
            text-decoration: none;
            transition: 0.2s;
        }
        .button:hover {
            background: #d4e4f5;
            transform: scale(1.02);
        }
        .footer-note {
            color: #5f7d9c;
            font-size: 0.9rem;
            margin-top: 25px;
            font-style: italic;
        }
        .home-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ffffffdd;
            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            color: #333;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-btn">🏠 Home</a>
    
    <div class="container">
        <div class="construction-icon">🚧</div>
        <h1>MA 4</h1>
        <h2>Spelling Test</h2>
        
        <div class="message">
            <span class="highlight">📢 UNDER CONSTRUCTION</span>
            <br><br>
            We're building this page.<br>
            <strong>Spelling Test MA 2 is already available</strong><br>
            in the Listening Centre.
        </div>
        
        <a href="index-ad.html" class="button">🎧 Go to Listening Centre</a>
        <a href="spelling-ma2.html" class="button" style="background: #1e4e73; color: white; border-color: #0a3142;">📄 Try MA 2 Instead</a>
        
        <div class="footer-note">
            ✨ MA 1 · MA 3 · MA 4 will be ready soon
        </div>
    </div>
</body>
</html>
