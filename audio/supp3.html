<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 3</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  h1 {
    text-align: center;
    font-size: 42px;
    margin-bottom: 40px;
    font-weight: 400;
  }
  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .menu-card {
    background: white;
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    text-decoration: none;
    color: #333;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 0.2s;
    border: 1px solid #eee;
  }
  .menu-card:active {
    background: #fafafa;
    transform: scale(0.99);
  }
  .menu-card .emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 15px;
  }
  .menu-card .label {
    font-size: 28px;
    font-weight: 400;
  }
  .back {
    text-align: center;
    margin-top: 40px;
    text-decoration: none;
    color: #888;
    font-size: 18px;
  }
  .back:active {
    color: #333;
  }
</style>
</head>
<body>

<div class="container">
  <h1>📙Menu</h1>
  
  <div class="menu-grid">
    <a href="supp3/index-supp3.html" class="menu-card">
      <span class="emoji">📖🎧</span>
      <span class="label">Stories</span>
    </a>
    
    <a href="supp3-eb.html" class="menu-card">
      <span class="emoji">📝🔊</span>
      <span class="label">EB Worksheets</span>
    </a>
  </div>
  
  <a href="index-ad.html" class="back">←</a>
</div>

</body>
</html>
